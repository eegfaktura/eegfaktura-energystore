# Voll-Pipeline (Build + Push + dispatch-deploy) fuer eegfaktura-energystore.
# Pusht ins Development-Tier ghcr.io/vfeeg-development/eegfaktura-energystore
# gemaess ADR-0005 (Two-Tier-Image-Registry) im Platform-Repo.
#
# Build-Flow:
#   1. Checkout
#   2. Go-Setup + protoc-Codegen (siehe Makefile)
#   3. docker/login-action mit VFEEG_DEV_PUSH_PAT (Cross-Org-Push)
#   4. docker/build-push-action -> ghcr.io/vfeeg-development/eegfaktura-energystore
#   5. Build-Provenance-Attestation
#   6. repository_dispatch deploy-energystore an Platform-Repo
#
# Vorbedingungen:
#   - VFEEG_DEV_PUSH_PAT-Secret im Repo (Classic PAT, write:packages auf
#     vfeeg-development, 90-Tage-Expiry)
#   - PLATFORM_DEPLOY_PAT-Secret (fuer dispatch-Trigger)
#   - K8s-Manifest k8s/50-energystore.yaml im Platform-Repo zeigt auf
#     ghcr.io/vfeeg-development/eegfaktura-energystore:latest
#   - deploy-on-dispatch.yml im Platform-Repo akzeptiert `deploy-energystore`

name: Docker Image CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: "ghcr.io"
  # Image landet im Development-Tier (vfeeg-development), nicht im Release-Tier
  # (eegfaktura). Siehe ADR-0005 im Platform-Repo. Repo-Name bleibt dynamisch,
  # damit das Template ohne Aenderung in andere Source-Repos uebernehmbar ist.
  IMAGE_NAME: vfeeg-development/${{ github.event.repository.name }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go (for protoc plugins)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install protoc + Go gRPC plugins
        run: |
          set -eu
          # Reproduziert den `make protoc`-Schritt aus dem Makefile.
          # Generierte Files (z.B. protoc/masterdata.pb.go) sind im Repo
          # nicht committet (nur protoc/excel.pb.go) — Devs lassen das
          # lokal vor `make docker` laufen. CI muss das selbst tun.
          # GitHub-Runner haben das Microsoft-azure-cli-Repo vorinstalliert, das
          # zeitweise 403 liefert. Wir brauchen es fuer protobuf-compiler nicht —
          # vor `apt-get update` raus, damit echte Fehler nicht maskiert werden.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run protoc codegen
        run: |
          set -eu
          export PATH="$HOME/go/bin:$PATH"
          protoc --experimental_allow_proto3_optional=true \
            --proto_path=. \
            --go_out=. --go_opt=paths=source_relative \
            --go-grpc_out=. --go-grpc_opt=paths=source_relative \
            ./protoc/*.proto
          ls -la protoc/

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title="eegfaktura-energystore"
            org.opencontainers.image.description="EEG Faktura energy store - holds the energy data of renewable communities (Go)"
            org.opencontainers.image.source=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.url=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.version=${{ github.sha || '' }}
            org.opencontainers.image.revision=${{ github.sha || '' }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || '' }}
            org.opencontainers.image.authors="eegfaktura@vfeeg.org"
            org.opencontainers.image.vendor="Verein zur Förderung von Erneuerbaren Energiegemeinschaften"
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id || '' }}
            org.opencontainers.image.ref.name=${{ github.ref || '' }}
            org.opencontainers.image.ref.sha=${{ github.sha || '' }}
            org.opencontainers.image.repository=${{ github.repository || '' }}

      - name: Login to Container Registry
        # Push cross-org nach vfeeg-development/* — GITHUB_TOKEN reicht dafuer
        # nicht (scope ist auf den source-repo beschraenkt). Nutzen den Classic-PAT
        # VFEEG_DEV_PUSH_PAT (write:packages auf vfeeg-development, 90-Tage-Expiry).
        # GHCR validiert via Token, nicht via username — github.actor bleibt.
        # Pull-Requests duerfen nicht pushen, daher Login-Step nur bei push-event.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.VFEEG_DEV_PUSH_PAT }}

      - name: Build (PR) / Build and push (push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags || 'latest' }}
          labels: ${{ steps.meta.outputs.labels || '' }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Generate artifact attestation
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Triggert das Platform-Repo, damit es den Cluster aktualisiert.
  # Laeuft nur bei push to default-branch (main/master), nicht bei PRs oder Tags.
  # Vorbedingung: PLATFORM_DEPLOY_PAT-Secret im Repo gesetzt (Fine-grained PAT
  # 'eegfaktura-platform-dispatch' mit Repository-Dispatch-Write auf
  # vfeeg-development/eegfaktura-platform).
  dispatch-deploy:
    needs: build-and-push-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy in platform repo
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DEPLOY_PAT }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "event_type": "deploy-energystore",
            "client_payload": {
              "image_tag": "latest",
              "source_sha": "${GITHUB_SHA}",
              "source_repo": "${GITHUB_REPOSITORY}",
              "source_ref": "${GITHUB_REF}"
            }
          }
          EOF
          )
          echo "$PAYLOAD" | gh api repos/vfeeg-development/eegfaktura-platform/dispatches --input -
          echo "Dispatched deploy-energystore for sha=${GITHUB_SHA:0:8}"
